<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực - PLANTREES GARDEN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #2e7d32; --accent: #81c784; --bg: #f0f4f0; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .box { 
            background: white; padding: 40px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(46, 125, 50, 0.1); 
            width: 350px; text-align: center; 
            transition: all 0.3s ease;
        }
        .brand-name { 
            font-size: 36px; font-weight: 900; color: var(--primary); 
            letter-spacing: -1.5px; margin-bottom: 5px;
        }
        #title { 
            margin-top: 0; margin-bottom: 30px; font-size: 14px; 
            color: #888; text-transform: uppercase; letter-spacing: 2px;
        }
        .input-group { position: relative; margin: 10px 0; }
        input { 
            width: 100%; padding: 15px; border: 2px solid #f0f0f0; 
            border-radius: 15px; box-sizing: border-box; outline: none; 
            background: #f9f9f9; color: #333; font-size: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: white; }
        .show-btn { 
            position: absolute; right: 12px; top: 12px; 
            background: #eee; border: none; padding: 6px 10px; 
            border-radius: 8px; font-size: 10px; cursor: pointer; color: #666; 
        }
        button.main { 
            width: 100%; padding: 16px; background: var(--primary); 
            color: #fff; border: none; border-radius: 15px; 
            cursor: pointer; font-weight: bold; font-size: 16px; 
            margin-top: 15px; box-shadow: 0 8px 20px rgba(46, 125, 50, 0.2);
            transition: 0.3s;
        }
        button.main:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(46, 125, 50, 0.3); }
        .link { margin-top: 25px; font-size: 13px; color: var(--primary); cursor: pointer; font-weight: 600; }
        .forgot { display: block; text-align: right; font-size: 12px; color: #999; margin-bottom: 15px; cursor: pointer; }
        #error { color: #e53935; font-size: 12px; margin-top: 15px; min-height: 18px; font-weight: 500; }
    </style>
</head>
<body>
<div class="box">
    <div class="brand-name">PLANTREES</div>
    <h2 id="title">ĐĂNG NHẬP</h2>
    
    <input type="text" id="username" placeholder="Tên người làm vườn" style="display: none;">
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Email của bạn">
    </div>
    
    <div class="input-group">
        <input type="password" id="pass" placeholder="Mật khẩu">
        <button class="show-btn" onclick="togglePass()">HIỆN</button>
    </div>

    <a class="forgot" id="forgotBtn" onclick="forgotPass()">Quên mật khẩu?</a>

    <button class="main" onclick="handleAuth()" id="btnSubmit">ĐĂNG NHẬP</button>
    
    <div id="error"></div>
    
    <div class="link" onclick="switchMode()" id="toggleTxt">Chưa có tài khoản? Đăng ký ngay</div>
</div>

<script>
// Giữ nguyên Config Plantrees của Duy
const firebaseConfig = {
  apiKey: "AIzaSyAASOFywyAkx2G7ubR_XsODI1U2x7mSMpE",
  authDomain: "plantrees-b1d99.firebaseapp.com",
  databaseURL: "https://plantrees-b1d99-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "plantrees-b1d99",
  storageBucket: "plantrees-b1d99.firebasestorage.app",
  messagingSenderId: "208821406000",
  appId: "1:208821406000:web:b4fac89c9a2f65d739e0f5"
};
    
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let isLogin = true;

function togglePass() {
    const p = document.getElementById("pass");
    const btn = event.target;
    p.type = p.type === "password" ? "text" : "password";
    btn.innerText = p.type === "password" ? "HIỆN" : "ẨN";
}

function switchMode() {
    isLogin = !isLogin;
    document.getElementById("title").innerText = isLogin ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";
    document.getElementById("btnSubmit").innerText = isLogin ? "ĐĂNG NHẬP" : "ĐĂNG KÝ";
    document.getElementById("toggleTxt").innerText = isLogin ? "Chưa có tài khoản? Đăng ký ngay" : "Đã có tài khoản? Đăng nhập";
    document.getElementById("username").style.display = isLogin ? "none" : "block";
    document.getElementById("forgotBtn").style.display = isLogin ? "block" : "none";
    document.getElementById("error").innerText = "";
}

async function forgotPass() {
    const email = document.getElementById("email").value;
    if (!email) return alert("Vui lòng nhập Email!");
    try {
        await auth.sendPasswordResetEmail(email);
        alert("Link đặt lại mật khẩu đã được gửi!");
    } catch (e) { alert("Lỗi: " + e.message); }
}

// Giữ nguyên Logic đăng ký/đăng nhập từ Sky Dodge của Duy
async function handleAuth() {
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value;
    const nickname = document.getElementById("username").value.trim();
    const err = document.getElementById("error");
    
    if(!email || !pass || (!isLogin && !nickname)) return err.innerText = "Điền đầy đủ thông tin!";
    err.innerText = "Đang xử lý...";

    try {
        if (isLogin) {
            await auth.signInWithEmailAndPassword(email, pass);
            window.location.href = "index.html";
        } else {
            if (nickname.length < 3) return err.innerText = "Tên ít nhất 3 ký tự!";

            // Tạo tài khoản
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            
            // Kiểm tra tên trùng
            const nameCheck = await db.ref('users').orderByChild('name').equalTo(nickname).once('value');
            if (nameCheck.exists()) {
                await res.user.delete();
                return err.innerText = "Tên này đã có người dùng!";
            }

            // Lưu dữ liệu vào Database
            await res.user.updateProfile({ displayName: nickname });
            await db.ref('users/' + res.user.uid).set({
                name: nickname,
                email: email,
                waterLevel: 0, // Đã đổi thành waterLevel cho đúng game Plantrees
                createdAt: Date.now()
            });

            alert("Đăng ký thành công!");
            window.location.href = "index.html";
        }
    } catch (e) { 
        err.innerText = e.message; 
    }
}
</script>
</body>
</html>
